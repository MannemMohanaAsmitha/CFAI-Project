<!doctype html><html><head><meta charset='utf-8'><meta name='viewport' content='width=device-width, initial-scale=1'>
<title>AI Board Game Arena</title><link rel='stylesheet' href='{{ url_for("static", filename="css/style.css") }}'></head>
<body><div class='glow g1'></div><div class='glow g2'></div>
<nav><a class='brand' href='/dashboard'>🎮 AI Board Game Arena</a><div>{% if session.user %}<a href='/dashboard'>Dashboard</a><a href='/leaderboard'>Leaderboard</a><a href='/history'>History</a><a href='/logout'>Logout</a>{% else %}<a href='/login'>Login</a><a href='/register'>Register</a>{% endif %}</div></nav>
{% with messages=get_flashed_messages() %}{% if messages %}<div class='flash'>{{ messages[0] }}</div>{% endif %}{% endwith %}
<main>{% block content %}{% endblock %}</main><script src='{{ url_for("static", filename="js/main.js") }}'></script>{% block scripts %}{% endblock %}</body></html>
